<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>数据库备份 — FMS</title>
<script src="/axios.min.js"></script>
<style>
/* ====== CSS Variables — 匹配 FMS 主题 ====== */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap');

:root {
  --bg-primary: #07090f; --bg-secondary: #0d1526;
  --bg-card: #0f1a2e; --bg-card-hover: #142035; --bg-input: #0a1220;
  --border: rgba(0, 212, 255, 0.1); --border-accent: rgba(0, 212, 255, 0.4);
  --accent: #00d4ff; --accent-glow: rgba(0, 212, 255, 0.3);
  --accent2: #7b61ff; --accent2-glow: rgba(123, 97, 255, 0.25);
  --text-primary: #d4e5f7; --text-secondary: #7a90b5; --text-muted: #4a6080;
  --success: #10b981; --error: #ef4444; --warning: #f59e0b; --info: #3b82f6;
  --purple: #8b5cf6;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 1px rgba(0, 212, 255, 0.1);
  --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.08);
  --radius-xs: 4px; --radius-sm: 8px; --radius: 8px; --radius-md: 12px; --radius-lg: 16px;
  --transition-fast: 0.15s ease; --transition-normal: 0.25s ease;
}
[data-theme="light"] {
  --bg-primary: #eef2f8; --bg-secondary: #f8fafc;
  --bg-card: #ffffff; --bg-card-hover: #f5f8ff; --bg-input: #edf2f9;
  --border: rgba(100, 140, 220, 0.12); --border-accent: rgba(0, 112, 224, 0.35);
  --accent: #0070e0; --accent-glow: rgba(0, 112, 224, 0.18);
  --accent2: #6050e8; --accent2-glow: rgba(96, 80, 232, 0.18);
  --text-primary: #1a2848; --text-secondary: #4a6090; --text-muted: #8aa0c0;
  --shadow-card: 0 2px 16px rgba(0, 30, 80, 0.08), 0 1px 3px rgba(0, 60, 160, 0.04);
  --shadow-glow: 0 4px 24px rgba(0, 112, 224, 0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font:14px/1.6 'Syne', sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
}
.mono,code,pre,.log-viewer{font-family:'Share Tech Mono',monospace}
input:focus,button:focus,select:focus{outline:none;box-shadow:0 0 0 2px var(--accent-glow)}
a{color:var(--accent);text-decoration:none;transition:color var(--transition-fast)}
a:hover{color:var(--text-primary)}

/* ====== Header ====== */
header{
  background:var(--bg-secondary);backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  padding:0 20px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;height:56px;
}
header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text-primary)}
header nav{display:flex;gap:12px;align-items:center;font-size:13px}
.theme-toggle{
  cursor:pointer;background:var(--bg-card);border:1px solid var(--border);
  color:var(--text-secondary);padding:6px 12px;border-radius:var(--radius-sm);
  font-size:13px;font-family:'Syne',sans-serif;font-weight:600;
  transition:all var(--transition-normal);
}
.theme-toggle:hover{border-color:var(--border-accent);color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}

/* ====== Layout ====== */
main{max-width:1440px;margin:0 auto;padding:20px 24px}

/* ====== Stats ====== */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--bg-card);padding:16px;border-radius:var(--radius-md);
  border:1px solid var(--border);text-align:center;
  transition:all var(--transition-normal);position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity var(--transition-normal)}
.stat-card:hover{box-shadow:var(--shadow-glow);border-color:var(--border-accent)}
.stat-card:hover::before{opacity:1}
.stat-val{font-size:24px;font-weight:700;color:var(--accent);font-family:'Share Tech Mono',monospace;text-shadow:0 0 20px var(--accent-glow)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* ====== Tabs ====== */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{
  padding:10px 20px;background:none;border:none;color:var(--text-muted);
  font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--transition-fast);
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--text-primary)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ====== Section ====== */
.section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-card)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.section-header h3{font-size:14px;font-weight:700;color:var(--text-primary)}

/* ====== Buttons ====== */
.btn{
  display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;
  background:var(--bg-card);color:var(--text-primary);font-family:'Syne',sans-serif;
  transition:all var(--transition-fast);white-space:nowrap;
}
.btn:hover{border-color:var(--border-accent);box-shadow:0 0 12px var(--accent-glow)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff;box-shadow:0 0 20px var(--accent2-glow)}
.btn-outline{background:transparent;border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;border:1px solid var(--error);color:var(--error)}
.btn-danger:hover{background:var(--error);color:#fff}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#059669;border-color:#059669}
.btn-xs{padding:3px 10px;font-size:11px}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ====== Form ====== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px}
.form-group input,.form-group select{
  padding:10px 12px;background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;
  font-family:'Share Tech Mono',monospace;transition:border-color var(--transition-fast)
}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
.form-hint{font-size:10px;color:var(--text-muted);margin-top:2px}
.checkbox-row{display:flex;align-items:center;gap:8px}
.checkbox-row label{font-size:13px;color:var(--text-primary);cursor:pointer;margin-bottom:0;text-transform:none;letter-spacing:0}

/* ====== Collapsible ====== */
.collapse-header{
  cursor:pointer;display:flex;align-items:center;gap:8px;
  padding:12px 0;border-top:1px solid var(--border);margin-top:12px;
  font-size:13px;font-weight:600;color:var(--text-primary);
  user-select:none;transition:color var(--transition-fast)
}
.collapse-header:hover{color:var(--accent)}
.collapse-body{display:none;padding:8px 0 16px}
.collapse-body.open{display:block}
.collapse-arrow{transition:transform var(--transition-fast);font-size:10px}
.collapse-header.open .collapse-arrow{transform:rotate(90deg)}

/* ====== Table ====== */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg-secondary)}
th{text-align:left;padding:10px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
tbody tr{transition:background var(--transition-fast)}
tbody tr:hover{background:var(--bg-card-hover)}
tbody tr:last-child td{border-bottom:none}

/* ====== Badges ====== */
.badge{display:inline-block;padding:2px 8px;border-radius:var(--radius-xs);font-size:10px;font-weight:600;letter-spacing:0.3px}
.badge-ok{background:rgba(16,185,129,0.12);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.badge-err{background:rgba(239,68,68,0.12);color:var(--error);border:1px solid rgba(239,68,68,0.3)}
.badge-gray{background:rgba(100,116,139,0.12);color:var(--text-muted);border:1px solid rgba(100,116,139,0.3)}

/* ====== Empty ====== */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:0.5}

/* ====== Pagination ====== */
.pagination{display:flex;gap:8px;margin-top:12px;justify-content:center;align-items:center;font-size:12px}
.pagination button{padding:6px 12px}

/* Embed Mode */
body.embed-mode header{display:none!important}
body.embed-mode main{padding:8px 0 0 0;max-width:100%}
body.embed-mode .section{border-radius:0;border-left:none;border-right:none;margin-bottom:0}
body.embed-mode .stats{margin-bottom:12px}
body.embed-mode .tabs{margin-bottom:12px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-size:13px;z-index:3000;box-shadow:var(--shadow-card);animation:slideIn 0.3s ease;max-width:400px}
.toast.toast-ok{border-color:var(--success)}
.toast.toast-err{border-color:var(--error)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ====== Mobile Cards ====== */
/* Desktop: hide backup cards */
.backup-card-list{display:none}
.backup-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;display:flex;flex-direction:column;gap:6px;
}
.backup-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.backup-card-name{font-weight:600;font-size:12px;word-break:break-all;flex:1;min-width:0}
.backup-card-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary)}
.backup-card-row span:last-child{font-weight:500;color:var(--text-primary)}
.backup-card-actions{display:flex;gap:4px;margin-top:4px;justify-content:flex-end}
@media(max-width:768px){
  .table-wrap{display:none}
  .backup-card-list{display:flex;flex-direction:column;gap:8px}
  .search-bar{flex-direction:column}
}

</style>
</head>
<body>
<header>
  <h1>🗄️ 数据库备份</h1>
  <nav>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <a href="/home.html">← 返回首页</a>
  </nav>
</header>

<main>
<!-- Stats -->
<div class="stats">
  <div class="stat-card"><div class="stat-val" id="stat-last-backup">-</div><div class="stat-label">上次备份</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-total-backups">0</div><div class="stat-label">备份总数</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-total-size">0 MB</div><div class="stat-label">总大小</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-db-size">-</div><div class="stat-label">当前DB大小</div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="schedule">🕐 定时备份</button>
  <button class="tab-btn" data-tab="history">📁 备份文件</button>
</div>

<!-- Tab 1: Schedule Config -->
<div class="tab-panel active" id="panel-schedule">
  <div class="section">
    <form id="backup-config-form" onsubmit="return false">
      <!-- ====== 备份存储路径（通用设置） ====== -->
      <h3 style="font-size:14px;font-weight:700;color:var(--text-primary);margin:0 0 12px">📂 备份存储路径</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>本地备份目录</label>
          <input type="text" id="cfg-backup-dir" placeholder="如: ./backups 或 /data/backups">
          <div class="form-hint">确保有写入权限，建议使用绝对路径。手动备份和定时备份共用此路径</div>
        </div>
        <div class="form-group">
          <label>保留天数</label>
          <input type="number" id="cfg-retention-days" min="1" max="365" value="30">
          <div class="form-hint">超过此天数的旧备份将自动删除</div>
        </div>
      </div>

      <!-- Compress -->
      <div class="form-group" style="margin-top:12px">
        <div class="checkbox-row">
          <input type="checkbox" id="cfg-compress">
          <label for="cfg-compress">压缩为 ZIP（节省存储空间）</label>
        </div>
      </div>

      <!-- ====== 定时备份 ====== -->
      <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:16px">
        <h3 style="font-size:14px;font-weight:700;color:var(--text-primary);margin:0 0 12px">🕐 定时备份</h3>
        <div class="form-group" style="margin-bottom:12px">
          <div class="checkbox-row">
            <input type="checkbox" id="cfg-enabled" onchange="toggleScheduleFields()">
            <label for="cfg-enabled">启用定时备份</label>
          </div>
        </div>
        <div id="schedule-fields">
          <div class="form-grid">
            <div class="form-group">
              <label>备份频率</label>
              <select id="cfg-schedule-type" onchange="toggleDayField()">
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="monthly">每月</option>
              </select>
            </div>
            <div class="form-group">
              <label>执行时间</label>
              <input type="time" id="cfg-schedule-time" value="03:00">
            </div>
            <div class="form-group" id="day-field-group" style="display:none">
              <label id="day-field-label">日期</label>
              <select id="cfg-schedule-day"></select>
            </div>
          </div>
        </div>
      </div>

      <!-- WebDAV Cloud Sync (Collapsible) -->
      <div class="collapse-header" id="webdav-collapse-header" onclick="toggleWebDAVSection()">
        <span class="collapse-arrow">▶</span> ☁️ WebDAV 云存储同步（可选）
      </div>
      <div class="collapse-body" id="webdav-collapse-body">
        <div class="form-group" style="margin-bottom:12px">
          <div class="checkbox-row">
            <input type="checkbox" id="cfg-webdav-enabled" onchange="toggleWebDAVFields()">
            <label for="cfg-webdav-enabled">备份完成后同步到 WebDAV 云存储</label>
          </div>
        </div>
        <div id="webdav-fields" style="display:none">
          <div class="form-grid">
            <div class="form-group">
              <label>WebDAV 服务器地址（含完整路径）</label>
              <input type="text" id="cfg-webdav-url" placeholder="如: https://cloud.example.com/remote.php/dav/files/user 或 http://127.0.0.1:88/webdav/token">
            </div>
            <div class="form-group">
              <label>用户名（留空使用匿名访问）</label>
              <input type="text" id="cfg-webdav-username" placeholder="留空=匿名访问">
            </div>
          </div>
          <div class="form-grid" style="margin-top:12px">
            <div class="form-group">
              <label>密码（留空使用匿名访问）</label>
              <input type="password" id="cfg-webdav-password" placeholder="留空不修改">
            </div>
            <div class="form-group">
              <label>远程子目录（可选）</label>
              <input type="text" id="cfg-webdav-path" value="/" placeholder="留空=根目录">
              <div class="form-hint">备份文件将存到此子目录下，如 Backups（自动拼接到地址后面）</div>
            </div>
          </div>
          <div class="btn-group" style="margin-top:8px">
            <button type="button" class="btn btn-outline btn-sm" id="btn-test-webdav" onclick="testWebDAV()">🔍 测试连接</button>
            <span id="test-webdav-result" style="font-size:12px;color:var(--text-muted)"></span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="btn-group" style="margin-top:20px">
        <button type="button" class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
        <button type="button" class="btn btn-success" onclick="runBackupNow()">▶ 立即备份</button>
      </div>
    </form>
  </div>
</div>

<!-- Tab 2: Backup History -->
<div class="tab-panel" id="panel-history">
  <div class="section">
    <div class="section-header">
      <h2>📁 备份文件列表</h2>
      <button class="btn btn-outline btn-sm" onclick="loadBackupList()">🔄 刷新</button>
    </div>
    <div id="backup-list-container"><div class="empty">加载中...</div></div>
        <!-- Mobile backup cards -->
        <div id="backup-cards" class="backup-card-list"></div>
    <div class="pagination" id="backup-pagination"></div>
  </div>
</div>
</main>


<script>

// ---- Mobile: sync backup cards from table rows (global) ----
function syncBackupCards(){
  var cardsEl=$('backup-cards');
  var container=$('backup-list-container');
  if(!cardsEl||!container)return;
  var table=container.querySelector('table');
  if(!table){cardsEl.innerHTML='';return;}
  var rows=table.querySelectorAll('tbody tr');
  var html='';
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var cells=r.querySelectorAll('td');
    if(!cells.length)continue;
    // cells: [filename, size, compress, webdav, status, date, actions]
    var name=cells[0].textContent.trim();
    var size=cells[1].textContent.trim();
    var compress=cells[2].innerHTML;
    var webdav=cells[3].innerHTML;
    var status=cells[4].innerHTML;
    var date=cells[5].textContent.trim();
    var actions=cells[6].innerHTML;
    html+='<div class="backup-card">'+
      '<div class="backup-card-header">'+
        '<span class="backup-card-name" title="'+name+'">'+name+'</span>'+
        status+
      '</div>'+
      '<div class="backup-card-row"><span>大小</span><span>'+size+'</span></div>'+
      '<div class="backup-card-row"><span>压缩</span>'+compress+'</div>'+
      '<div class="backup-card-row"><span>WebDAV</span>'+webdav+'</div>'+
      '<div class="backup-card-row"><span>日期</span><span>'+date+'</span></div>'+
      '<div class="backup-card-actions">'+actions+'</div>'+
    '</div>';
  }
  cardsEl.innerHTML=html;
}
// ====== Theme ======
function toggleTheme(){
  var h=document.documentElement;
  var cur=h.getAttribute('data-theme');
  var next=cur==='dark'?'light':'dark';
  h.setAttribute('data-theme',next);
  localStorage.setItem('fms-theme',next);
  try{window.parent.postMessage({type:'theme-change',theme:next},'*')}catch(e){}
}
function $(id){return document.getElementById(id)}

// ====== API ======
function api(method,url,data){
  return axios({
    method:method,url:url,
    params:method==='get'?data:undefined,
    data:method!=='get'?data:undefined,
    withCredentials:true,
    headers:{'X-Device-Id':localStorage.getItem('_fs_device_id')||'web_admin'}
  }).then(function(r){return r.data}).catch(function(e){
    var m='网络错误';if(e.response&&e.response.data&&e.response.data.message)m=e.response.data.message;
    return{code:-1,message:m,data:null};
  });
}

// ====== Toast ======
function toast(msg,type){
  var t=document.createElement('div');t.className='toast toast-'+(type||'ok');t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(function(){t.remove()},300)},2500);
}

function fmtDate(d){if(!d)return'-';return d.replace('T',' ').substring(0,16)}
function fmtSize(bytes){if(!bytes||bytes===0)return'0 B';var units=['B','KB','MB','GB'];var i=0;var s=bytes;while(s>=1024&&i<units.length-1){s/=1024;i++}return s.toFixed(i===0?0:2)+' '+units[i]}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ====== Tab Switching ======
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
    btn.classList.add('active');
    var panel=$('panel-'+btn.getAttribute('data-tab'));
    if(panel)panel.classList.add('active');
    if(btn.getAttribute('data-tab')==='history')loadBackupList();
  });
});

// ====== Config ======
var currentPage=1;
var pageSize=20;

function toggleScheduleFields(){
  var enabled=$('cfg-enabled').checked;
  var fields=$('schedule-fields');
  if(fields)fields.style.opacity=enabled?'1':'0.4';
  var inputs=fields?fields.querySelectorAll('input,select'):[];
  inputs.forEach(function(i){if(i.id!=='cfg-enabled')i.disabled=!enabled});
}

function toggleDayField(){
  var type=$('cfg-schedule-type').value;
  var group=$('day-field-group');
  var sel=$('cfg-schedule-day');
  var label=$('day-field-label');
  sel.innerHTML='';
  if(type==='weekly'){
    group.style.display='';
    label.textContent='星期几';
    var days=['周日','周一','周二','周三','周四','周五','周六'];
    days.forEach(function(d,i){sel.innerHTML+='<option value="'+i+'">'+d+'</option>'});
  }else if(type==='monthly'){
    group.style.display='';
    label.textContent='几号';
    for(var i=1;i<=31;i++){sel.innerHTML+='<option value="'+i+'">'+i+'号</option>'}
  }else{
    group.style.display='none';
  }
}

function toggleWebDAVSection(){
  var header=$('webdav-collapse-header');
  var body=$('webdav-collapse-body');
  if(body.classList.contains('open')){
    body.classList.remove('open');
    header.classList.remove('open');
  }else{
    body.classList.add('open');
    header.classList.add('open');
  }
}

function toggleWebDAVFields(){
  var enabled=$('cfg-webdav-enabled').checked;
  var fields=$('webdav-fields');
  if(fields)fields.style.display=enabled?'':'none';
}

function testWebDAV(){
  var btn=$('btn-test-webdav');
  var result=$('test-webdav-result');
  btn.disabled=true;btn.textContent='⏳ 测试中...';result.textContent='';
  api('post','/api/admin/backup/test-webdav',{
    webdav_url:$('cfg-webdav-url').value.trim(),
    webdav_username:$('cfg-webdav-username').value.trim(),
    webdav_password:$('cfg-webdav-password').value,
    webdav_path:$('cfg-webdav-path').value.trim()||'/'
  }).then(function(r){
    btn.disabled=false;btn.textContent='🔍 测试连接';
    if(r.code===0){
      result.innerHTML='<span style="color:var(--success)">✅ '+r.message+'</span>';
      toast('WebDAV 连接成功','ok');
    }else{
      result.innerHTML='<span style="color:var(--error)">❌ '+r.message+'</span>';
      toast(r.message,'err');
    }
  });
}

var _configLoaded=false;
function loadConfig(){
  api('get','/api/admin/backup/config').then(function(r){
    if(r.code!==0){toast(r.message,'err');return}
    var d=r.data||{};
    var cfg=d.config||{};
    var stats=d.stats||{};

    // Stats (always update)
    refreshStatsFromData(stats);

    // Config form (only fill on first load, don't overwrite user edits)
    if(cfg&&!_configLoaded){
      _configLoaded=true;
      $('cfg-enabled').checked=cfg.enabled;
      $('cfg-schedule-type').value=cfg.schedule_type||'daily';
      $('cfg-schedule-time').value=cfg.schedule_time||'03:00';
      $('cfg-backup-dir').value=cfg.backup_dir||'';
      $('cfg-retention-days').value=cfg.retention_days||30;
      $('cfg-compress').checked=cfg.compress;
      $('cfg-webdav-enabled').checked=cfg.webdav_enabled;
      $('cfg-webdav-url').value=cfg.webdav_url||'';
      $('cfg-webdav-username').value=cfg.webdav_username||'';
      $('cfg-webdav-password').value=cfg.webdav_password||'';
      $('cfg-webdav-path').value=cfg.webdav_path||'/';

      toggleDayField();
      var sel=$('cfg-schedule-day');
      if(sel&&cfg.schedule_day!==undefined){sel.value=cfg.schedule_day}

      toggleScheduleFields();
      toggleWebDAVFields();
      if(cfg.webdav_enabled){
        var body=$('webdav-collapse-body');
        var header=$('webdav-collapse-header');
        if(body){body.classList.add('open')}
        if(header){header.classList.add('open')}
      }
    }
  });
}

function refreshStatsFromData(stats){
  if(!stats)return;
  if(stats.last_backup){
    $('stat-last-backup').textContent=fmtDate(stats.last_backup);
    $('stat-last-backup').title=stats.last_filename||'';
  }else{
    $('stat-last-backup').textContent='从未备份';
  }
  $('stat-total-backups').textContent=stats.total_backups||0;
  $('stat-total-size').textContent=fmtSize(stats.total_size||0);
  $('stat-db-size').textContent=fmtSize(stats.db_size||0);
}

function refreshStats(){
  api('get','/api/admin/backup/config').then(function(r){
    if(r.code===0&&r.data&&r.data.stats){
      refreshStatsFromData(r.data.stats);
    }
  });
}

function saveConfig(){
  var data={
    enabled:$('cfg-enabled').checked,
    schedule_type:$('cfg-schedule-type').value,
    schedule_time:$('cfg-schedule-time').value,
    schedule_day:parseInt($('cfg-schedule-day').value,10)||0,
    backup_dir:$('cfg-backup-dir').value.trim(),
    retention_days:parseInt($('cfg-retention-days').value,10)||30,
    compress:$('cfg-compress').checked,
    webdav_enabled:$('cfg-webdav-enabled').checked,
    webdav_url:$('cfg-webdav-url').value.trim(),
    webdav_username:$('cfg-webdav-username').value.trim(),
    webdav_password:$('cfg-webdav-password').value,
    webdav_path:$('cfg-webdav-path').value.trim()||'/'
  };
  api('put','/api/admin/backup/config',data).then(function(r){
    if(r.code===0){toast('配置已保存','ok');loadConfig()}else{toast(r.message,'err')}
  });
}

function runBackupNow(){
  if(!confirm('确定立即备份数据库吗？'))return;
  var btn=document.querySelector('#panel-schedule .btn-success');
  if(btn){btn.disabled=true;btn.textContent='⏳ 备份中...'}
  api('post','/api/admin/backup/now').then(function(r){
    if(btn){btn.disabled=false;btn.textContent='▶ 立即备份'}
    if(r.code===0){
      toast('备份任务已启动 (任务#'+r.data.task_id+')','ok');
      // Navigate to tasks page
      if(window.parent&&window.parent.__fm){
        setTimeout(function(){window.parent.__fm.showView('admin-tasks')},1500);
      }
      // Refresh config stats after a delay
      setTimeout(function(){loadConfig()},3000);
    }else{
      toast(r.message,'err');
    }
  });
}

// ====== Backup List ======
function loadBackupList(page){
  page=page||currentPage;
  var offset=(page-1)*pageSize;
  api('get','/api/admin/backup/list',{limit:pageSize,offset:offset}).then(function(r){
    if(r.code!==0){toast(r.message,'err');return}
    var d=r.data||{};
    var records=d.records||[];
    var total=d.total||0;
    var container=$('backup-list-container');
    var pagination=$('backup-pagination');

    if(records.length===0){
      container.innerHTML='<div class="empty"><div class="empty-icon">📭</div>暂无备份文件</div>';
      pagination.innerHTML='';
      return;
    }

    var html='<div class="table-wrap"><table><thead><tr><th>文件名</th><th>大小</th><th>压缩</th><th>WebDAV</th><th>状态</th><th>日期</th><th>操作</th></tr></thead><tbody>';
    records.forEach(function(rec){
      html+='<tr>';
      html+='<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(rec.filename)+'">'+escHtml(rec.filename)+'</td>';
      html+='<td>'+fmtSize(rec.file_size)+'</td>';
      html+='<td>'+(rec.is_compressed?'<span class="badge badge-ok">ZIP</span>':'<span class="badge badge-gray">原始</span>')+'</td>';
      var wdLabel='';
      if(rec.webdav_synced===1)wdLabel='<span class="badge badge-ok">已同步</span>';
      else if(rec.webdav_synced===-1)wdLabel='<span class="badge badge-err" title="'+escHtml(rec.webdav_message||'')+'">失败</span>';
      else wdLabel='<span class="badge badge-gray">-</span>';
      html+='<td>'+wdLabel+'</td>';
      html+='<td>'+(rec.status==='completed'?'<span class="badge badge-ok">完成</span>':'<span class="badge badge-err">错误</span>')+'</td>';
      html+='<td style="font-size:11px">'+fmtDate(rec.created_at)+'</td>';
      html+='<td><div class="btn-group">';
      html+='<button class="btn btn-outline btn-xs" onclick="downloadBackup('+rec.id+')">⬇ 下载</button>';
      html+='<button class="btn btn-danger btn-xs" onclick="deleteBackup('+rec.id+')">删除</button>';
      html+='</div></td>';
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    container.innerHTML=html;
    if(typeof syncBackupCards==='function')syncBackupCards();

    // Pagination
    var totalPages=Math.ceil(total/pageSize);
    var pageHtml='';
    if(totalPages>1){
      pageHtml+='<button class="btn btn-outline btn-xs" onclick="loadBackupList('+(page-1)+')" '+(page<=1?'disabled':'')+'>← 上一页</button>';
      pageHtml+='<span style="font-size:12px;color:var(--text-muted)">'+page+' / '+totalPages+'</span>';
      pageHtml+='<button class="btn btn-outline btn-xs" onclick="loadBackupList('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>下一页 →</button>';
    }
    pagination.innerHTML=pageHtml;
    currentPage=page;
  });
}

function downloadBackup(id){
  window.open('/api/admin/backup/download/'+id,'_blank');
}

function deleteBackup(id){
  if(!confirm('确定删除此备份文件？此操作不可撤销。'))return;
  api('delete','/api/admin/backup/files/'+id).then(function(r){
    if(r.code===0){toast('备份文件已删除','ok');loadBackupList(currentPage);loadConfig()}
    else toast(r.message,'err');
  });
}

// ====== Init ======
  // ---- Mobile: auto-sync backup cards via MutationObserver ----
  var backupContainer=$('backup-list-container');
  if(backupContainer)new MutationObserver(function(){syncBackupCards();}).observe(backupContainer,{childList:true,subtree:true});

document.addEventListener('DOMContentLoaded',function(){
  // Restore theme
  var saved=localStorage.getItem('fms-theme');
  if(saved)document.documentElement.setAttribute('data-theme',saved);
  // Embed mode
  if(window.location.search.indexOf('embed=1')!==-1)document.body.classList.add('embed-mode');
  // Theme sync from parent
  window.addEventListener('message',function(e){
    if(e.data&&e.data.theme)document.documentElement.setAttribute('data-theme',e.data.theme);
  });

  // Check login (matching admin-storage.html pattern)
  axios.get('/api/auth/me',{withCredentials:true}).then(function(r){
    if(r.data.code!==0||!r.data.data||!r.data.data.user){
      window.location.href='/login.html?return='+encodeURIComponent('/admin-backup.html');
      return;
    }
    if(!r.data.data.user.is_admin){
      document.body.innerHTML='<div style="text-align:center;padding:100px 20px;color:var(--text-primary)"><h2>🛡️ 需要管理员权限</h2></div>';
      return;
    }
    loadConfig();
    // Auto-refresh stats every 30 seconds (form fields NOT overwritten)
    setInterval(function(){refreshStats()},30000);
  }).catch(function(){
    window.location.href='/login.html?return='+encodeURIComponent('/admin-backup.html');
  });

  // Tab param from URL
  var params=new URLSearchParams(window.location.search);
  var tab=params.get('tab');
  if(tab==='history'){
    document.querySelectorAll('.tab-btn').forEach(function(b){
      b.classList.toggle('active',b.getAttribute('data-tab')==='history');
    });
    document.querySelectorAll('.tab-panel').forEach(function(p){
      p.classList.toggle('active',p.id==='panel-history');
    });
    loadBackupList();
  }
});
</script>
