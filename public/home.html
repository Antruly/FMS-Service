<!-- Auth check + 视图初始化 -->
<script>
(function() {
  // 设置 axios 跨域携带 cookie
  axios.defaults.withCredentials = true;

  // 等 app.js 的 window.__fm 准备好（最多等 500ms）
  function waitForApp(callback) {
    var tries = 0;
    var maxTries = 50; // 50 * 10ms = 500ms
    function check() {
      tries++;
      if (window.__fm && window.__fm.init) {
        callback();
      } else if (tries < maxTries) {
        setTimeout(check, 10);
      }
    }
    check();
  }

  // 扫码回调处理
  function handleScanResult(result) {
    var overlay = document.getElementById('scanner-overlay');
    if (overlay) overlay.style.display = 'none';

    if (result && result.content) {
      // 处理扫码结果
      window.__fm && window.__fm.handleScanResult(result.content);
    } else if (result && result.error) {
      window.__fm && window.__fm.showToast && window.__fm.showToast(result.error, '&#9888;');
    }
  }

  // 监听来自父窗口的扫码结果
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'scan_result') {
      handleScanResult(event.data);
    }
  });

  function onReady() {
    // 初始化 app
    if (window.__fm && window.__fm.init) {
      window.__fm.init();
    }

    // 初始化扫码功能 - 通过 postMessage 请求父窗口调用原生插件
    window.__fm = window.__fm || {};
    window.__fm.openScanner = function() {
      var overlay = document.getElementById('scanner-overlay');
      var hintEl = document.getElementById('scanner-hint');
      var errorEl = document.getElementById('scanner-error');
      if (!overlay) return;

      overlay.style.display = 'flex';
      if (hintEl) { hintEl.textContent = '正在启动相机...'; hintEl.style.display = 'block'; }
      if (errorEl) { errorEl.style.display = 'none'; errorEl.textContent = ''; }

      // 通过 postMessage 请求父窗口启动扫码
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'scan_request' }, '*');
      } else {
        // 在原生环境中，直接调用 Capacitor 插件
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner) {
          window.Capacitor.Plugins.BarcodeScanner.startScanning({}, function(result) {
            handleScanResult(result);
          }, function(error) {
            if (errorEl) { errorEl.textContent = '扫码失败: ' + (error.message || error); errorEl.style.display = 'block'; }
            if (hintEl) hintEl.style.display = 'none';
          });
        } else {
          if (errorEl) { errorEl.textContent = '扫码插件未加载'; errorEl.style.display = 'block'; }
          if (hintEl) hintEl.style.display = 'none';
        }
      }
    };

    window.__fm.closeScanner = function() {
      var overlay = document.getElementById('scanner-overlay');
      if (overlay) overlay.style.display = 'none';
    };

    window.__fm.handleScanResult = function(text) {
      if (!text) {
        window.__fm.showToast && window.__fm.showToast('未识别到内容', '&#9888;');
        return;
      }

      try {
        var url = text.trim();

        // 分享链接格式1: /s/xxxx
        var match = url.match(/\/s\/([a-zA-Z0-9]+)/);
        if (match && match[1]) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(match[1]);
          return;
        }

        // 分享链接格式2: /share/xxxx
        match = url.match(/\/share[^\/]*\/([a-zA-Z0-9]+)/);
        if (match && match[1]) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(match[1]);
          return;
        }

        // 纯分享码格式（4-20位字母数字）
        if (/^[a-zA-Z0-9]{4,20}$/.test(url)) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(url);
          return;
        }

        // 完整URL解析
        if (url.startsWith('http')) {
          try {
            var parsedUrl = new URL(url);
            var hashMatch = parsedUrl.pathname.match(/\/s\/([a-zA-Z0-9]+)/) ||
                            parsedUrl.pathname.match(/\/share[^\/]*\/([a-zA-Z0-9]+)/);
            if (hashMatch && hashMatch[1]) {
              window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
              window.location.href = '/share.html?hash=' + encodeURIComponent(hashMatch[1]);
              return;
            }
          } catch (e) {}
        }

        window.__fm.showToast && window.__fm.showToast('无法识别的内容', '&#9888;');
      } catch (e) {
        console.error('[Scanner] 处理扫码结果失败:', e);
        window.__fm.showToast && window.__fm.showToast('处理扫码结果失败', '&#9888;');
      }
    };

    // Auth check
    axios.get('/api/auth/me')
      .then(function(res) {
        if (res.data.code === 0 && res.data.data && res.data.data.user) {
          var user = res.data.data.user;
          var email = user.email || '';
          var nickname = user.nickname || email.split('@')[0];
          var initials = nickname.substring(0, 1).toUpperCase();

          var dropdown = document.getElementById('user-dropdown');
          var userEmail = document.getElementById('user-email');
          var sidebarUserEmail = document.getElementById('sidebar-user-email');
          var sidebarUserAvatar = document.getElementById('sidebar-user-avatar');
          var userMenuEmail = document.getElementById('user-menu-email');
          var userMenuAvatar = document.getElementById('user-menu-avatar');
          var userMenuRole = document.getElementById('user-menu-role');
          var menuBtnProfile = document.getElementById('menu-btn-profile');
          var menuBtnPassword = document.getElementById('menu-btn-password');
          var menuBtnAdmin = document.getElementById('menu-btn-admin');
          var navAdmin = document.getElementById('nav-admin');
          var navLogs = document.getElementById('nav-logs');

          if (dropdown) dropdown.style.display = 'flex';
          if (userEmail) userEmail.textContent = nickname.length > 8 ? nickname.substring(0, 8) + '...' : nickname;
          if (sidebarUserEmail) sidebarUserEmail.textContent = nickname.length > 12 ? nickname.substring(0, 12) + '...' : nickname;
          if (sidebarUserAvatar) sidebarUserAvatar.textContent = initials;
          if (userMenuEmail) userMenuEmail.textContent = email;
          if (userMenuAvatar) userMenuAvatar.textContent = initials;
          if (userMenuRole) userMenuRole.innerHTML = user.is_admin ? '&#128737; 管理员' : '&#128100; 普通用户';
          if (menuBtnProfile) menuBtnProfile.style.display = 'block';
          if (menuBtnPassword) menuBtnPassword.style.display = 'block';
          if (menuBtnAdmin && user.is_admin) menuBtnAdmin.style.display = 'block';
          if (navAdmin && user.is_admin) navAdmin.style.display = 'flex';
          if (navLogs && user.is_admin) navLogs.style.display = 'flex';

          document.addEventListener('click', function(e) {
            var menu = document.getElementById('user-menu');
            var btn = document.getElementById('user-btn');
            if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
              menu.classList.remove('show');
              window.__fm && window.__fm.closeUserMenu();
            }
          });

          window.__auth = {
            logout: function() {
              // 清除原生保存的认证信息
              if (window.AndroidCallback && window.AndroidCallback.clearAuthInfo) {
                window.AndroidCallback.clearAuthInfo();
              }
              axios.post('/api/auth/logout')
                .then(function() { window.location.href = '/login.html'; })
                .catch(function() { window.location.href = '/login.html'; });
            }
          };

          // 兼容旧版 URL 参数重定向（如 ?view=offline → #offline）
          var urlParams = new URLSearchParams(window.location.search);
          var viewParam = urlParams.get('view');
          if (viewParam === 'offline') {
            // 切换到 hash 路由，避免参数在刷新时保留
            window.location.replace('/home.html#' + viewParam);
            return;
          }
        } else {
          window.location.href = '/login.html';
        }
      })
      .catch(function() {
        window.location.href = '/login.html';
      });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    waitForApp(onReady);
  } else {
    document.addEventListener('DOMContentLoaded', function() { waitForApp(onReady); });
  }
})();

<script>
(function(){
  var container = document.getElementById('mobile-floating-ball');
  var ballBtn = container.querySelector('.ball-btn');
  var panel = document.getElementById('ball-panel');
  var corner = document.getElementById('mobile-floating-ball-corner');
  var hideBtn = document.getElementById('mobile-dl-hide');
  var qrEl = document.getElementById('mobile-dl-qr');
  var linkEl = document.getElementById('mobile-dl-link');
  var progressFill = document.getElementById('ball-progress-fill');
  var progressText = document.getElementById('ball-progress-text');
  var uploadSection = document.getElementById('ball-upload-section');
  var uploadList = document.getElementById('ball-upload-list');
  var uploadEmpty = document.getElementById('ball-upload-empty');
  var appSection = document.getElementById('ball-app-section');
  var CIRCUMFERENCE = 2 * Math.PI * 21.5; // ~135.09
  var idleDot = document.getElementById('ball-idle-dot');
  var lastProgress = -1;
  var panelMode = 'app'; // 'app' | 'upload'

  // --- State ---
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('_fs_ball_pos')||'{}'); } catch(e) {}
  // Force visible on first load after redesign (clear old hidden state)
  if (saved.hidden && !localStorage.getItem('_fs_ball_v2')) {
    saved.hidden = false; saved.x = null; saved.y = null;
    localStorage.setItem('_fs_ball_v2', '1');
  }
  var x = (saved.x != null && !isNaN(saved.x)) ? saved.x : (window.innerWidth - 70);
  var y = (saved.y != null && !isNaN(saved.y)) ? saved.y : (window.innerHeight * 0.4);
  var hidden = !!saved.hidden;
  var cornerSide = saved.cornerSide || 'right';
  var cornerPos = saved.cornerPos != null ? saved.cornerPos : 40; // 贴边位置的百分比（右/左侧=top%, 上/下侧=left%）
  var isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent) || window.innerWidth < 768;

  function saveState() {
    try { localStorage.setItem('_fs_ball_pos', JSON.stringify({x:x, y:y, hidden:hidden, cornerSide:cornerSide, cornerPos:cornerPos})); } catch(e) {}
  }
  function position() {
    container.style.left = x + 'px'; container.style.top = y + 'px';
    container.style.right = 'auto'; container.style.bottom = 'auto';
    container.style.display = '';
  }
  function showCorner() {
    container.style.display = 'none';
    corner.style.display = 'block';
    corner.style.right = ''; corner.style.left = ''; corner.style.top = ''; corner.style.bottom = '';
    corner.style.transform = '';
    if (cornerSide === 'right') {
      corner.style.right = '0'; corner.style.top = cornerPos + '%';
      corner.setAttribute('data-side', 'right');
    } else if (cornerSide === 'left') {
      corner.style.left = '0'; corner.style.top = cornerPos + '%';
      corner.setAttribute('data-side', 'left');
    } else if (cornerSide === 'bottom') {
      corner.style.bottom = '0'; corner.style.left = cornerPos + '%'; corner.style.transform = 'translateX(-50%)';
      corner.setAttribute('data-side', 'bottom');
    } else {
      corner.style.top = '0'; corner.style.left = cornerPos + '%'; corner.style.transform = 'translateX(-50%)';
      corner.setAttribute('data-side', 'top'); cornerSide = 'top';
    }
  }
  function showBall() {
    var maxX = window.innerWidth - 30, maxY = window.innerHeight - 30;
    if (x < -30 || x > maxX || y < -30 || y > maxY) { x = maxX - 20; y = maxY - 100; }
    x = Math.max(-30, Math.min(maxX, x));
    y = Math.max(-30, Math.min(maxY, y));
    hidden = false; position(); corner.style.display = 'none'; saveState();
  }
  function hideBall() {
    var cx = x + 25, cy = y + 25;
    var dR = window.innerWidth - cx, dL = cx, dB = window.innerHeight - cy, dT = cy;
    var minD = Math.min(dR, dL, dB, dT);
    if (minD === dR) cornerSide = 'right';
    else if (minD === dL) cornerSide = 'left';
    else if (minD === dB) cornerSide = 'bottom';
    else cornerSide = 'top';
    hidden = true; showCorner(); saveState();
  }

  // --- Progress circle update ---
  function updateProgressCircle(pct) {
    if (pct === lastProgress) return;
    lastProgress = pct;
    if (pct > 0) {
      // Show percentage, hide idle dot
      if (idleDot) idleDot.style.display = 'none';
      progressText.style.display = '';
      var dashoffset = CIRCUMFERENCE * (1 - pct / 100);
      progressFill.style.strokeDasharray = CIRCUMFERENCE;
      progressFill.style.strokeDashoffset = dashoffset;
      progressFill.style.stroke = pct >= 100 ? '#2ea043' : '#00d4ff';
      progressText.textContent = Math.round(pct) + '%';
    } else {
      resetProgressCircle();
    }
  }
  function resetProgressCircle() {
    lastProgress = -1;
    if (idleDot) idleDot.style.display = '';
    progressText.style.display = 'none';
    progressFill.style.strokeDasharray = '0';
    progressFill.style.strokeDashoffset = CIRCUMFERENCE;
  }

  // --- Tab switching ---
  var tabTransfer = document.getElementById('ball-tab-transfer');
  var tabApp = document.getElementById('ball-tab-app');
  var tabBadge = document.getElementById('ball-tab-badge');

  function switchBallTab(tabName) {
    panelMode = tabName;
    if (tabName === 'transfer') {
      tabTransfer.classList.add('active'); tabApp.classList.remove('active');
      uploadSection.style.display = ''; appSection.style.display = 'none';
      renderUploadList();
    } else {
      tabApp.classList.add('active'); tabTransfer.classList.remove('active');
      uploadSection.style.display = 'none'; appSection.style.display = '';
      tryRenderQr();
    }
  }
  tabTransfer.addEventListener('click', function(e){ e.stopPropagation(); switchBallTab('transfer'); });
  tabApp.addEventListener('click', function(e){ e.stopPropagation(); switchBallTab('app'); });

  function updateBallTabBadge(count) {
    if (count > 0) {
      tabBadge.textContent = count > 99 ? '99+' : count;
      tabBadge.style.display = 'inline-flex';
    } else {
      tabBadge.style.display = 'none';
    }
  }

  function showUploadPanel() { switchBallTab('transfer'); }
  function showAppPanel() { switchBallTab('app'); }

  // --- Render upload list ---
  function renderUploadList() {
    console.log('[FloatBall] renderUploadList called');
    var transfers = [];
    try {
      if (window.__fm && window.__fm._getActiveTransfers) {
        transfers = window.__fm._getActiveTransfers();
        console.log('[FloatBall] _getActiveTransfers returned', transfers.length, 'items');
      }
    } catch(e) { console.error('[FloatBall] _getActiveTransfers error:', e); }
    // Also check pending from localStorage
    try {
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k.indexOf('transfer_pending_') === 0) {
          var meta = JSON.parse(localStorage.getItem(k));
          var exists = transfers.find(function(t){return t.transferId === meta.transferId;});
          if (!exists) transfers.push({fileName:meta.fileName,fileSize:meta.fileSize,transferId:meta.transferId,status:'pending',progress:0,uploadedChunks:[],totalChunks:meta.totalChunks||0});
        }
      }
    } catch(e) {}

    if (transfers.length === 0) {
      uploadList.innerHTML = ''; uploadEmpty.style.display = '';
      resetProgressCircle();
      updateBallTabBadge(0);
      return;
    }
    uploadEmpty.style.display = 'none';
    updateBallTabBadge(transfers.length);

    // Calculate overall progress
    var totalChunks = 0, doneChunks = 0;
    transfers.forEach(function(t) {
      // 如果是直接上传（非切片），使用 progress 字段
      if (t.progress != null && (!t.uploadedChunks || t.uploadedChunks.size === 0)) {
        totalChunks += 100;
        doneChunks += t.progress;
      } else {
        totalChunks += (t.totalChunks || 1);
        doneChunks += (t.uploadedChunks ? t.uploadedChunks.size || t.uploadedChunks.length : 0);
      }
    });
    var overallPct = totalChunks > 0 ? Math.round(doneChunks / totalChunks * 100) : 0;
    updateProgressCircle(overallPct);

    var html = '';
    transfers.forEach(function(t) {
      // 直接上传（非切片）：使用 progress 字段；切片上传：基于 uploadedChunks 计算
      var pct;
      if (t.progress != null && (!t.uploadedChunks || t.uploadedChunks.size === 0)) {
        pct = t.progress;
      } else {
        pct = t.totalChunks > 0 ? Math.round((t.uploadedChunks ? (t.uploadedChunks.size || t.uploadedChunks.length) : 0) / t.totalChunks * 100) : 0;
      }
      var statusClass = t.status === 'completed' ? 'completed' : (t.status === 'error' ? 'error' : 'uploading');
      var statusText = t.status === 'completed' ? '✓' : (t.status === 'error' ? '✕' : pct + '%');
      var sizeStr = t.fileSize > 1048576 ? (t.fileSize/1048576).toFixed(1)+'MB' : (t.fileSize/1024).toFixed(0)+'KB';
      html += '<div class="ball-upload-item">';
      html += '<span style="font-size:14px">📄</span>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div class="ball-upload-name">' + escHtml(t.fileName) + '</div>';
      html += '<div class="ball-upload-bar"><div class="ball-upload-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
      html += '<span class="ball-upload-size">' + sizeStr + '</span>';
      html += '<span class="ball-upload-status ' + statusClass + '">' + statusText + '</span>';
      html += '</div>';
    });
    uploadList.innerHTML = html;
  }

  // --- Initialize: render correct panel ---
  function initPanel() {
    var hasUploads = false;
    try {
      if (window.__fm && window.__fm._getActiveTransfers) {
        var t = window.__fm._getActiveTransfers();
        if (t && t.length > 0) hasUploads = true;
      }
    } catch(e) {}
    if (!hasUploads) {
      try {
        for (var i = 0; i < localStorage.length; i++) {
          if (localStorage.key(i).indexOf('transfer_pending_') === 0) { hasUploads = true; break; }
        }
      } catch(e) {}
    }
    if (hasUploads) { showUploadPanel(); renderUploadList(); }
    else { showAppPanel(); resetProgressCircle(); }
  }

  // --- Timing ---
  initPanel();
  var updateTimer = setInterval(function() {
    if (panel.classList.contains('show')) return;
    // Only update if there might be uploads (panelMode is 'app' or 'transfer')
    if (panelMode === 'transfer' || (window.__fm && window.__fm._getActiveTransfers && window.__fm._getActiveTransfers().length > 0)) {
      renderUploadList();
    }
  }, 1000);

  // Public API for app.js to call
  window._floatBallPulse = function() {
    console.log('[FloatBall] _floatBallPulse called');
    ballBtn.classList.add('float-ball-bounce');
    setTimeout(function(){ ballBtn.classList.remove('float-ball-bounce'); }, 500);
    switchBallTab('transfer');
    // Open panel briefly
    if (!panel.classList.contains('show')) {
      panel.classList.add('show');
      positionPanel();
      setTimeout(function(){ panel.classList.remove('show'); }, 2000);
    }
  };
  window._floatBallRefresh = function() { console.log('[FloatBall] _floatBallRefresh called'); renderUploadList(); };

  // --- Drag logic (ball + corner tab) ---
  if (hidden) { showCorner(); } else { position(); }
  var dragging, startX, startY, startOX, startOY, moved;
  var cornerDragging, cornerStartX, cornerStartY, cornerStartPos, cornerMoved, cornerLastDx, cornerLastDy;

  // Ball drag start
  function onDown(ex, ey) {
    if (ex.target && (panel.contains(ex.target) || ex.target === hideBtn)) return;
    startX = ex; startY = ey; startOX = x; startOY = y;
    dragging = true; moved = false;
  }
  ballBtn.addEventListener('mousedown', function(e){ ballBtn.classList.add('dragging'); onDown(e.clientX, e.clientY); });
  ballBtn.addEventListener('touchstart', function(e){
    if (e.target && (panel.contains(e.target) || e.target === hideBtn)) return;
    e.preventDefault(); // 阻止浏览器下拉刷新手势
    ballBtn.classList.add('dragging');
    onDown(e.touches[0].clientX, e.touches[0].clientY);
    // 抑制 body 的 overscroll 行为，防止页面级下拉刷新
    document.body.style.overscrollBehavior = 'none';
    // 通知原生 App 禁用下拉刷新（SwipeRefreshLayout）
    try { window.AndroidApp && window.AndroidApp.setPageScrollState(true); } catch(ignore) {}
  }, {passive:false});

  // Corner tab drag start
  corner.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    cornerDragging = true; cornerMoved = false;
    cornerStartX = e.clientX; cornerStartY = e.clientY;
    cornerStartPos = cornerPos;
    e.preventDefault();
  });
  corner.addEventListener('touchstart', function(e) {
    e.preventDefault();
    document.body.style.overscrollBehavior = 'none';
    // 通知原生 App 禁用下拉刷新（SwipeRefreshLayout）
    try { window.AndroidApp && window.AndroidApp.setPageScrollState(true); } catch(ignore) {}
    cornerDragging = true; cornerMoved = false;
    cornerStartX = e.touches[0].clientX; cornerStartY = e.touches[0].clientY;
    cornerStartPos = cornerPos;
  }, {passive: false});

  function onMove(ex, ey) {
    // Corner tab dragging
    if (cornerDragging) {
      var cdx = ex - cornerStartX, cdy = ey - cornerStartY;
      if (Math.abs(cdx) < 2 && Math.abs(cdy) < 2) return;
      cornerMoved = true;
      cornerLastDx = cdx; cornerLastDy = cdy; // 保存最后位置用于释放判断
      if (cornerSide === 'right' || cornerSide === 'left') {
        // 沿垂直边缘滑动
        var rawTop = cornerStartPos + (cdy / window.innerHeight * 100);
        cornerPos = Math.max(5, Math.min(95, rawTop));
        corner.style.top = cornerPos + '%';
      } else {
        // 沿水平边缘滑动
        var rawLeft = cornerStartPos + (cdx / window.innerWidth * 100);
        cornerPos = Math.max(5, Math.min(95, rawLeft));
        corner.style.left = cornerPos + '%';
      }
      return;
    }
    // Ball dragging
    if (!dragging) return;
    var dx = ex - startX, dy = ey - startY;
    if (Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
    moved = true;
    x = startOX + dx; y = startOY + dy;
    x = Math.max(-30, Math.min(window.innerWidth - 30, x));
    y = Math.max(-30, Math.min(window.innerHeight - 30, y));
    position();
  }
  document.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  document.addEventListener('touchmove', function(e){ if (dragging || cornerDragging) e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

  function onUp() {
    // 恢复原生 App 下拉刷新
    try { window.AndroidApp && window.AndroidApp.setPageScrollState(false); } catch(ignore) {}
    // Corner tab release
    if (cornerDragging) {
      cornerDragging = false;
      document.body.style.overscrollBehavior = '';
      if (cornerMoved) {
        var cdx = cornerLastDx || 0, cdy = cornerLastDy || 0;
        // 判断是否向中间拉动（垂直方向偏离边缘超过阈值）
        var pulledTowardCenter = false;
        if (cornerSide === 'right' && cdx < -50) pulledTowardCenter = true;
        else if (cornerSide === 'left' && cdx > 50) pulledTowardCenter = true;
        else if (cornerSide === 'bottom' && cdy < -50) pulledTowardCenter = true;
        else if (cornerSide === 'top' && cdy > 50) pulledTowardCenter = true;

        if (pulledTowardCenter) {
          showBall();
        }
      } else {
        // 轻触贴边标签（未拖动）→ 显示悬浮球（替代被 preventDefault 阻止的 click 事件）
        showBall();
      }
      saveState();
      return;
    }
    // Ball release
    ballBtn.classList.remove('dragging');
    document.body.style.overscrollBehavior = ''; // 恢复 body overscroll
    if (!dragging) return;
    dragging = false;
    if (!moved) return;
    var cx = x + 25, cy = y + 25;
    var edge = 50;
    if (!panel.classList.contains('show')) {
      if (cx < edge || cx > window.innerWidth - edge || cy < edge || cy > window.innerHeight - edge) {
        hideBall();
      }
    }
    saveState();
  }
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);

  // --- Adaptive panel positioning ---
  function positionPanel() {
    var cx = x + 26, cy = y + 26; // ball center
    var panelW = 240, panelH = Math.min(360, panel.scrollHeight || 300);
    var gap = 8; // gap between ball and panel
    var margin = 10; // min distance from viewport edge

    // Reset all position props
    panel.style.bottom = ''; panel.style.top = '';
    panel.style.right = ''; panel.style.left = '';
    panel.style.maxHeight = '360px';

    // Vertical: show above if enough space, otherwise below
    var spaceAbove = cy - gap - margin;
    var spaceBelow = window.innerHeight - cy - 26 - gap - margin;
    if (spaceAbove > panelH) {
      panel.style.bottom = (52 + gap) + 'px'; // above ball
    } else if (spaceBelow > panelH) {
      panel.style.top = (52 + gap) + 'px'; // below ball
    } else if (spaceAbove > spaceBelow) {
      panel.style.bottom = (52 + gap) + 'px';
      panel.style.maxHeight = Math.max(120, spaceAbove) + 'px';
    } else {
      panel.style.top = (52 + gap) + 'px';
      panel.style.maxHeight = Math.max(120, spaceBelow) + 'px';
    }

    // Horizontal: align to side with more space
    if (cx + panelW + margin < window.innerWidth) {
      panel.style.left = '-4px'; // align left edge with ball left
    } else {
      panel.style.right = '-4px'; // align right edge with ball right
    }

    // Clamp if panel would overflow viewport
    var panelLeft = x + (panel.style.left !== '' ? -4 : (52 - panelW + 4));
    if (panelLeft < margin) { panel.style.left = (margin - x) + 'px'; panel.style.right = ''; }
    var panelRightEdge = x + 52 + (panel.style.right !== '' ? -4 : 0);
    if (panelRightEdge + panelW > window.innerWidth - margin) { panel.style.right = ''; panel.style.left = (window.innerWidth - margin - panelW - x) + 'px'; }
  }

  // --- Panel toggle ---
  ballBtn.addEventListener('click', function(e) {
    if (moved) return;
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) {
      positionPanel();
      if (panelMode === 'upload') { renderUploadList(); }
      else { tryRenderQr(); }
    }
  });
  ballBtn.addEventListener('touchend', function(e) {
    if (moved) return;
    e.preventDefault();
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) {
      positionPanel();
      if (panelMode === 'upload') { renderUploadList(); }
      else { tryRenderQr(); }
    }
  });

  // --- Close on outside click ---
  document.addEventListener('click', function(e) {
    if (!container.contains(e.target) && e.target !== corner) { panel.classList.remove('show'); }
  });
  panel.addEventListener('click', function(e) { e.stopPropagation(); });

  // --- Hide / corner ---
  hideBtn.addEventListener('click', hideBall);
  // Corner click: only showBall on tap (not drag). Handled in onUp via cornerMoved flag.
  corner.addEventListener('click', function(e) {
    if (!cornerMoved) showBall();
  });

  // --- Resize ---
  window.addEventListener('resize', function() {
    x = Math.max(-30, Math.min(window.innerWidth - 30, x));
    y = Math.max(-30, Math.min(window.innerHeight - 30, y));
    if (hidden) showCorner(); else position();
    if (panel.classList.contains('show')) positionPanel();
  });

  // --- QR Code (lazy load on first panel open) ---
  var qrLoaded = false;
  function escHtml(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
  function tryRenderQr() {
    if (qrLoaded) return;
    qrLoaded = true;
    fetch('/api/version/latest').then(function(r){return r.json()}).then(function(d){
      if (d.code === 0 && d.data) {
        linkEl.href = d.data.url || '#';
        linkEl.textContent = '📥 v'+d.data.version+' ('+Math.round(d.data.size/1024/1024)+'MB)';
        var theme = (document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'dark':'light';
        var fullUrl = d.data.url;
        if (fullUrl && fullUrl.indexOf('http') !== 0) {
          fullUrl = location.origin + (fullUrl.indexOf('/')===0?'':'/') + fullUrl;
        }
        var qrApiUrl = '/api/share/qr?url='+encodeURIComponent(fullUrl||location.href)+'&size=200&theme='+theme;
        // /api/share/qr returns JSON {code:0, data:"data:image/png;base64,..."}, not raw image
        fetch(qrApiUrl).then(function(r){return r.json()}).then(function(j){
          if (j.code === 0 && j.data) {
            var img = document.createElement('img');
            img.src = j.data; img.style.width='100%';img.style.height='100%';img.onerror=function(){qrEl.textContent='加载失败'};
            qrEl.innerHTML = ''; qrEl.appendChild(img);
          } else { qrEl.textContent = '暂无二维码'; }
        }).catch(function(){ qrEl.textContent = '加载失败'; });
      } else { qrEl.textContent = '暂无版本'; }
    });
  }
  // Call tryRenderQr after a short delay so serverUrl is available
  setTimeout(tryRenderQr, 2000);
})();
</script>
