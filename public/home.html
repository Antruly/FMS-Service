<!DOCTYPE html>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

<div class="corner-deco top-left" aria-hidden="true"></div>
<div class="corner-deco top-right" aria-hidden="true"></div>

<!-- ===================== LAYOUT ===================== -->

<!-- Auth check + 视图初始化 -->
<script>
(function() {
  // 设置 axios 跨域携带 cookie
  axios.defaults.withCredentials = true;

  // 等 app.js 的 window.__fm 准备好（最多等 500ms）
  function waitForApp(callback) {
    var tries = 0;
    var maxTries = 50; // 50 * 10ms = 500ms
    function check() {
      tries++;
      if (window.__fm && window.__fm.init) {
        callback();
      } else if (tries < maxTries) {
        setTimeout(check, 10);
      }
    }
    check();
  }

  // 扫码回调处理
  function handleScanResult(result) {
    var overlay = document.getElementById('scanner-overlay');
    if (overlay) overlay.style.display = 'none';

    if (result && result.content) {
      // 处理扫码结果
      window.__fm && window.__fm.handleScanResult(result.content);
    } else if (result && result.error) {
      window.__fm && window.__fm.showToast && window.__fm.showToast(result.error, '&#9888;');
    }
  }

  // 监听来自父窗口的扫码结果
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'scan_result') {
      handleScanResult(event.data);
    }
  });

  function onReady() {
    // 初始化 app
    if (window.__fm && window.__fm.init) {
      window.__fm.init();
    }

    // 初始化扫码功能 - 通过 postMessage 请求父窗口调用原生插件
    window.__fm = window.__fm || {};
    window.__fm.openScanner = function() {
      var overlay = document.getElementById('scanner-overlay');
      var hintEl = document.getElementById('scanner-hint');
      var errorEl = document.getElementById('scanner-error');
      if (!overlay) return;

      overlay.style.display = 'flex';
      if (hintEl) { hintEl.textContent = '正在启动相机...'; hintEl.style.display = 'block'; }
      if (errorEl) { errorEl.style.display = 'none'; errorEl.textContent = ''; }

      // 通过 postMessage 请求父窗口启动扫码
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'scan_request' }, '*');
      } else {
        // 在原生环境中，直接调用 Capacitor 插件
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner) {
          window.Capacitor.Plugins.BarcodeScanner.startScanning({}, function(result) {
            handleScanResult(result);
          }, function(error) {
            if (errorEl) { errorEl.textContent = '扫码失败: ' + (error.message || error); errorEl.style.display = 'block'; }
            if (hintEl) hintEl.style.display = 'none';
          });
        } else {
          if (errorEl) { errorEl.textContent = '扫码插件未加载'; errorEl.style.display = 'block'; }
          if (hintEl) hintEl.style.display = 'none';
        }
      }
    };

    window.__fm.closeScanner = function() {
      var overlay = document.getElementById('scanner-overlay');
      if (overlay) overlay.style.display = 'none';
    };

    window.__fm.handleScanResult = function(text) {
      if (!text) {
        window.__fm.showToast && window.__fm.showToast('未识别到内容', '&#9888;');
        return;
      }

      try {
        var url = text.trim();

        // 分享链接格式1: /s/xxxx
        var match = url.match(/\/s\/([a-zA-Z0-9]+)/);
        if (match && match[1]) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(match[1]);
          return;
        }

        // 分享链接格式2: /share/xxxx
        match = url.match(/\/share[^\/]*\/([a-zA-Z0-9]+)/);
        if (match && match[1]) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(match[1]);
          return;
        }

        // 纯分享码格式（4-20位字母数字）
        if (/^[a-zA-Z0-9]{4,20}$/.test(url)) {
          window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
          window.location.href = '/share.html?hash=' + encodeURIComponent(url);
          return;
        }

        // 完整URL解析
        if (url.startsWith('http')) {
          try {
            var parsedUrl = new URL(url);
            var hashMatch = parsedUrl.pathname.match(/\/s\/([a-zA-Z0-9]+)/) ||
                            parsedUrl.pathname.match(/\/share[^\/]*\/([a-zA-Z0-9]+)/);
            if (hashMatch && hashMatch[1]) {
              window.__fm.showToast && window.__fm.showToast('正在打开分享...', '&#128247;');
              window.location.href = '/share.html?hash=' + encodeURIComponent(hashMatch[1]);
              return;
            }
          } catch (e) {}
        }

        window.__fm.showToast && window.__fm.showToast('无法识别的内容', '&#9888;');
      } catch (e) {
        console.error('[Scanner] 处理扫码结果失败:', e);
        window.__fm.showToast && window.__fm.showToast('处理扫码结果失败', '&#9888;');
      }
    };

    // Auth check
    axios.get('/api/auth/me')
      .then(function(res) {
        if (res.data.code === 0 && res.data.data && res.data.data.user) {
          var user = res.data.data.user;
          var email = user.email || '';
          var nickname = user.nickname || email.split('@')[0];
          var initials = nickname.substring(0, 1).toUpperCase();

          var dropdown = document.getElementById('user-dropdown');
          var userEmail = document.getElementById('user-email');
          var sidebarUserEmail = document.getElementById('sidebar-user-email');
          var sidebarUserAvatar = document.getElementById('sidebar-user-avatar');
          var userMenuEmail = document.getElementById('user-menu-email');
          var userMenuAvatar = document.getElementById('user-menu-avatar');
          var userMenuRole = document.getElementById('user-menu-role');
          var menuBtnProfile = document.getElementById('menu-btn-profile');
          var menuBtnPassword = document.getElementById('menu-btn-password');
          var menuBtnAdmin = document.getElementById('menu-btn-admin');
          var navAdmin = document.getElementById('nav-admin');
          var navLogs = document.getElementById('nav-logs');

          if (dropdown) dropdown.style.display = 'flex';
          if (userEmail) userEmail.textContent = nickname.length > 8 ? nickname.substring(0, 8) + '...' : nickname;
          if (sidebarUserEmail) sidebarUserEmail.textContent = nickname.length > 12 ? nickname.substring(0, 12) + '...' : nickname;
          if (sidebarUserAvatar) sidebarUserAvatar.textContent = initials;
          if (userMenuEmail) userMenuEmail.textContent = email;
          if (userMenuAvatar) userMenuAvatar.textContent = initials;
          if (userMenuRole) userMenuRole.innerHTML = user.is_admin ? '&#128737; 管理员' : '&#128100; 普通用户';
          if (menuBtnProfile) menuBtnProfile.style.display = 'block';
          if (menuBtnPassword) menuBtnPassword.style.display = 'block';
          if (menuBtnAdmin && user.is_admin) menuBtnAdmin.style.display = 'block';
          if (navAdmin && user.is_admin) navAdmin.style.display = 'flex';
          if (navLogs && user.is_admin) navLogs.style.display = 'flex';

          document.addEventListener('click', function(e) {
            var menu = document.getElementById('user-menu');
            var btn = document.getElementById('user-btn');
            if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
              menu.classList.remove('show');
              window.__fm && window.__fm.closeUserMenu();
            }
          });

          window.__auth = {
            logout: function() {
              // 清除原生保存的认证信息
              if (window.AndroidCallback && window.AndroidCallback.clearAuthInfo) {
                window.AndroidCallback.clearAuthInfo();
              }
              axios.post('/api/auth/logout')
                .then(function() { window.location.href = '/login.html'; })
                .catch(function() { window.location.href = '/login.html'; });
            }
          };

          // 兼容旧版 URL 参数重定向（如 ?view=offline → #offline）
          var urlParams = new URLSearchParams(window.location.search);
          var viewParam = urlParams.get('view');
          if (viewParam === 'offline') {
            // 切换到 hash 路由，避免参数在刷新时保留
            window.location.replace('/home.html#' + viewParam);
            return;
          }
        } else {
          window.location.href = '/login.html';
        }
      })
      .catch(function() {
        window.location.href = '/login.html';
      });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    waitForApp(onReady);
  } else {
    document.addEventListener('DOMContentLoaded', function() { waitForApp(onReady); });
  }
})();
</script>

  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:'Share Tech Mono',monospace;color:var(--text-secondary);text-align:center;padding:20px">

    <div style="font-size:20px;font-weight:700;color:var(--text-primary)">JavaScript 已禁用</div>
    <div>请启用 JavaScript 以使用文件管理器</div>
  </div>

<!-- 悬浮球：移动端下载入口（可拖拽、贴边隐藏、角标恢复） -->
<style>
#mobile-floating-ball { position:fixed; z-index:9999; user-select:none; -webkit-user-select:none; }
#mobile-floating-ball .ball-btn { width:46px;height:46px;border-radius:50%;background:var(--bg-card,#1c2128);border:2px solid var(--border,#30363d);color:var(--text-secondary,#8b949e);font-size:21px;cursor:grab;box-shadow:0 4px 16px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:box-shadow .2s,transform .2s; }
#mobile-floating-ball .ball-btn:active { cursor:grabbing; }
#mobile-floating-ball .ball-btn:hover { box-shadow:0 0 20px rgba(0,212,255,0.3);transform:scale(1.05); }
#mobile-floating-ball .ball-panel { display:none;position:absolute;bottom:54px;right:0;background:var(--bg-card,#1c2128);border:1px solid var(--border,#30363d);border-radius:12px;padding:14px;width:200px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6); }
#mobile-floating-ball .ball-panel.show { display:block; }
#mobile-floating-ball .ball-panel .qr-wrap { width:120px;height:120px;margin:0 auto 10px;background:#fff;border-radius:8px;padding:4px;display:flex;align-items:center;justify-content:center;color:#0d1117;font-size:11px; }
#mobile-floating-ball .ball-panel .dl-link { color:#58a6ff;font-size:12px;text-decoration:none;display:block;margin-bottom:8px; }
#mobile-floating-ball .ball-panel .hide-btn { color:var(--text-muted,#666);font-size:11px;cursor:pointer;background:none;border:1px solid var(--border,#333);border-radius:6px;padding:3px 10px;transition:all .2s; }
#mobile-floating-ball .ball-panel .hide-btn:hover { color:var(--text-secondary,#aaa);border-color:var(--accent,#555); }
#mobile-floating-ball-corner { display:none;position:fixed;z-index:9998;width:18px;height:40px;background:var(--bg-card,#1c2128);border:2px solid var(--border,#30363d);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:all .2s; }
#mobile-floating-ball-corner:hover { border-color:var(--accent,#00d4ff);box-shadow:0 0 12px rgba(0,212,255,0.25); }
</style>
<div id="mobile-floating-ball">
  <div class="ball-btn" title="下载移动端App（可拖拽移动）">&#128241;</div>
  <div class="ball-panel">
    <p style="color:var(--text-primary,#e6edf3);font-size:13px;margin:0 0 8px;">扫码下载 FMS App</p>
    <div class="qr-wrap" id="mobile-dl-qr">加载中...</div>
    <a class="dl-link" id="mobile-dl-link" href="#">&#128229; 直接下载 APK</a>
    <button class="hide-btn" id="mobile-dl-hide">&#9664; 隐藏悬浮球</button>
  </div>
</div>
<div id="mobile-floating-ball-corner">&#128241;</div>
<script>
(function(){
  var container = document.getElementById('mobile-floating-ball');
  var ballBtn = container.querySelector('.ball-btn');
  var panel = container.querySelector('.ball-panel');
  var corner = document.getElementById('mobile-floating-ball-corner');
  var hideBtn = document.getElementById('mobile-dl-hide');
  var qrEl = document.getElementById('mobile-dl-qr');
  var linkEl = document.getElementById('mobile-dl-link');

  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('_fs_ball_pos') || '{}'); } catch(e) {}
  var x = saved.x != null ? saved.x : (window.innerWidth - 70);
  var y = saved.y != null ? saved.y : (window.innerHeight - 180);
  var hidden = saved.hidden || false;
  var cornerSide = saved.cornerSide || 'right';
  var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

  function saveState() {
    try { localStorage.setItem('_fs_ball_pos', JSON.stringify({x:x,y:y,hidden:hidden,cornerSide:cornerSide})); } catch(e) {}
  }
  function position() {
    container.style.left = x + 'px'; container.style.top = y + 'px';
    container.style.right = 'auto'; container.style.bottom = 'auto';
  }
  function showCorner() {
    corner.style.display = 'block'; corner.style.width='18px'; corner.style.height='40px';
    if (cornerSide === 'right') { corner.style.right='0'; corner.style.top=(y+3)+'px'; corner.style.left='auto'; corner.style.bottom='auto'; corner.style.borderRadius='20px 0 0 20px'; }
    else if (cornerSide === 'left') { corner.style.left='0'; corner.style.top=(y+3)+'px'; corner.style.right='auto'; corner.style.bottom='auto'; corner.style.borderRadius='0 20px 20px 0'; }
    else if (cornerSide === 'bottom') { corner.style.bottom='0'; corner.style.left=(x+13)+'px'; corner.style.width='40px'; corner.style.height='18px'; corner.style.borderRadius='20px 20px 0 0'; }
    else { corner.style.top='0'; corner.style.left=(x+13)+'px'; corner.style.width='40px'; corner.style.height='18px'; corner.style.borderRadius='0 0 20px 20px'; }
    container.style.display = 'none';
  }
  function showBall() {
    container.style.display = 'block'; corner.style.display = 'none'; hidden = false;
    if (x < 0) x = 20; if (x > window.innerWidth - 60) x = window.innerWidth - 70;
    if (y < 0) y = 20; if (y > window.innerHeight - 60) y = window.innerHeight - 70;
    position(); saveState();
  }
  function hideBall() {
    panel.classList.remove('show');
    var dr=window.innerWidth-(x+46), dl=x, db=window.innerHeight-(y+46), dt=y;
    var min=Math.min(dr,dl,db,dt);
    cornerSide = min===dr?'right':min===dl?'left':min===db?'bottom':'top';
    hidden=true; showCorner(); saveState();
  }

  if (hidden) { showCorner(); } else { position(); }

  // 拖拽
  var dragging=false, startX,startY,startOX,startOY, moved=false;
  container.addEventListener('mousedown', function(e){
    if (e.target.closest('.ball-panel') || e.target === hideBtn) return;
    dragging=true; moved=false;
    var pt = e.touches?e.touches[0]:e;
    startX=pt.clientX; startY=pt.clientY; startOX=x; startOY=y;
    container.style.transition='none'; e.preventDefault();
  });
  container.addEventListener('touchstart', function(e){
    if (e.target.closest('.ball-panel') || e.target === hideBtn) return;
    dragging=true; moved=false;
    var pt = e.touches[0];
    startX=pt.clientX; startY=pt.clientY; startOX=x; startOY=y;
    container.style.transition='none'; e.preventDefault();
  }, {passive:false});

  function onMove(ex, ey) {
    if (!dragging) return;
    var dx=ex-startX, dy=ey-startY;
    if (Math.abs(dx)>5||Math.abs(dy)>5) moved=true;
    x=Math.max(-30,Math.min(window.innerWidth-30,startOX+dx));
    y=Math.max(-30,Math.min(window.innerHeight-30,startOY+dy));
    position();
    // 拖拽时面板保持打开，不关闭
    // if (panel.classList.contains('show')) panel.classList.remove('show');
  }
  document.addEventListener('mousemove', function(e){onMove(e.clientX,e.clientY);});
  document.addEventListener('touchmove', function(e){onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});

  function onUp() {
    if (!dragging) return;
    dragging=false; container.style.transition='';
    // 移动距离 < 10px 视为点击，重置 moved 标志
    var totalDist = Math.sqrt(Math.pow(x-startOX,2)+Math.pow(y-startOY,2));
    if (totalDist < 10) moved = false;
    if (!panel.classList.contains('show')) {
      var dr=window.innerWidth-(x+46), dl=x, db=window.innerHeight-(y+46), dt=y;
      if (dr<50||dl<50||db<50||dt<50) {
        if (dr<50) x=window.innerWidth-5; else if (dl<50) x=-41;
        if (db<50) y=window.innerHeight-5; else if (dt<50) y=-41;
        position(); setTimeout(hideBall,300); return;
      }
    }
    saveState();
  }
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);

  // 移动端：用 touchend 直接切换面板（click 事件有 300ms 延迟且 moved 可能被误设）
  ballBtn.addEventListener('touchend', function(e){
    if (moved) return;
    e.preventDefault();
    e.stopPropagation();
    panel.classList.toggle('show');
    if (panel.classList.contains('show') && !qrEl.dataset.loaded) { qrEl.dataset.loaded='1'; tryRenderQr(); }
  });

  ballBtn.addEventListener('click', function(e){
    if (moved) return;
    e.stopPropagation();
    panel.classList.toggle('show');
    if (panel.classList.contains('show') && !qrEl.dataset.loaded) { qrEl.dataset.loaded='1'; tryRenderQr(); }
  });
  document.addEventListener('click', function(e){ if (panel.classList.contains('show') && !container.contains(e.target) && e.target !== corner) panel.classList.remove('show'); });
  panel.addEventListener('click', function(e){ e.stopPropagation(); });
  hideBtn.addEventListener('click', function(e){ e.stopPropagation(); hideBall(); });
  corner.addEventListener('click', showBall);
  window.addEventListener('resize', function(){
    if (x>window.innerWidth-30) x=window.innerWidth-70;
    if (y>window.innerHeight-30) y=window.innerHeight-70;
    if (!hidden) position(); else showCorner();
    saveState();
  });
  // 移动端也默认显示悬浮球（不自动隐藏）

  function tryRenderQr() {
    fetch('/api/version/latest').then(function(r){return r.json()}).then(function(d){
      if(d.code===0&&d.data&&d.data.url){
        var fullUrl = location.origin + d.data.url;
        linkEl.href = d.data.url;
        linkEl.textContent = '📥 v'+d.data.version+' ('+Math.round(d.data.size/1024/1024)+'MB)';
        function gen() {
          if (window.QRCode && window.QRCode.toDataURL) {
            var result = window.QRCode.toDataURL(fullUrl, { width: 200, margin: 1, color: { dark: '#000000', light: '#ffffff' } });
            if (result && typeof result.then === 'function') {
              result.then(function(dataUrl) { qrEl.innerHTML = '<img src="'+dataUrl+'" style="width:100%;height:100%;display:block">'; }).catch(function(){ qrEl.textContent = '生成失败'; });
            } else if (typeof result === 'string') {
              qrEl.innerHTML = '<img src="'+result+'" style="width:100%;height:100%;display:block">';
            } else { qrEl.textContent = '格式错误'; }
          } else { setTimeout(gen, 300); }
        }
        gen();
      } else { qrEl.textContent = '暂无版本'; }
    }).catch(function(){ qrEl.textContent = '加载失败'; });
  }
})();
</script>

</body>
</html>
